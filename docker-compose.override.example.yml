# Copy to docker-compose.override.yml on your VPS for HTTPS (not tracked by git).
# docker compose automatically merges this file.
services:
  nginx:
    ports:
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
