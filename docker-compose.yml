services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-forge_root_password_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-forgecms}
      MYSQL_USER: ${MYSQL_USER:-forgecms}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-forge_password_change_me}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-forge_root_password_change_me}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-forgecms}
      MYSQL_USER: ${MYSQL_USER:-forgecms}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-forge_password_change_me}
      # DATABASE_URL is built at container start from MYSQL_* (see docker/entrypoint-api.sh).
      DATABASE_URL: ${DATABASE_URL:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY:-change_me_settings}
      APP_URL: ${APP_URL:-http://localhost}
      API_PORT: 4000
      UPLOAD_DIR: /data/uploads
      BACKUP_DIR: /data/backups
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-25}
      NEXT_PUBLIC_API_URL: /api
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - forge_data:/data

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:4000
      NEXT_PUBLIC_API_URL: /api
      APP_URL: ${APP_URL:-http://localhost}

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      # Use nginx.ssl.conf + LETSENCRYPT volume for HTTPS (see .env.example).
      - ${NGINX_CONF:-./docker/nginx/nginx.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${LETSENCRYPT_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro

volumes:
  mysql_data:
  forge_data:
